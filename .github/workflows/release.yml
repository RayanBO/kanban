name: Release

# Se déclenche uniquement quand tu pushe un tag comme v1.2.3
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kb-windows-x64.exe
            binary: target/x86_64-pc-windows-msvc/release/kb.exe

          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kb-linux-x64
            binary: target/x86_64-unknown-linux-gnu/release/kb

          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: kb-macos-arm64
            binary: target/aarch64-apple-darwin/release/kb

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: kb-macos-x64
            binary: target/x86_64-apple-darwin/release/kb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Compiler
        run: cargo build --release --target ${{ matrix.target }}

      - name: Renommer le binaire
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Créer la Release GitHub
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Télécharger tous les binaires
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Créer la Release et uploader les binaires
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
