name: Release

# Se déclenche uniquement quand tu pushe un tag comme v1.2.5
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Windows x64 (pas de --target, le target natif est x86_64-pc-windows-msvc)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: kb-windows-x64.exe
            binary: target/release/kb.exe

          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: kb-linux-x64
            binary: target/x86_64-unknown-linux-gnu/release/kb

          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: kb-macos-arm64
            binary: target/aarch64-apple-darwin/release/kb

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: kb-macos-x64
            binary: target/x86_64-apple-darwin/release/kb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Compiler (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo build --release

      - name: Compiler (cross)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Renommer le binaire
        shell: bash
        run: cp ${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Install WiX
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          Invoke-RestMethod -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip" -OutFile wix.zip
          Expand-Archive -Path wix.zip -DestinationPath wix -Force

      - name: Build MSI
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $ver = Select-String -Path Cargo.toml -Pattern 'version = "(.*)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          New-Item -ItemType Directory -Force -Path target\wix | Out-Null
          .\wix\candle.exe -dVersion="$ver" -dBinaryPath="$pwd\target\release\kb.exe" -out target\wix\kb.wixobj wix\main.wxs
          .\wix\light.exe -cultures:null -out "target\wix\kb-$ver.msi" target\wix\kb.wixobj
          Copy-Item "target\wix\kb-$ver.msi" kb-windows-x64.msi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

      - name: Upload MSI
        if: matrix.target == 'x86_64-pc-windows-msvc'
        uses: actions/upload-artifact@v4
        with:
          name: kb-windows-x64.msi
          path: kb-windows-x64.msi

  release:
    name: Créer la Release GitHub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Télécharger tous les binaires
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Créer la Release et uploader les binaires
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
