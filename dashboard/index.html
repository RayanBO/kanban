                            stroke-width="2"

        <script>
            const COLORS = [
                "#6366f1",
                "#22c55e",
                "#f59e0b",
                "#ef4444",
                "#8b5cf6",
                "#06b6d4",
                "#f43f5e",
                "#84cc16",
            ];
            let TASKS = [];
            let TRASH = [];
            let USERS = [];
            let COMMENTS = [];
            let useTrash = true;
            let currentHeroTaskId = null;
            let editingTaskId = null;
            let activeTagFilter = "";
            let selectedCommentAuthorId = "";
            let exportStatusTimer = null;
            let commentTooltipHideTimer = null;

            async function apiJson(path, opts) {
                const r = await fetch(path, opts);
                const payload = await r.json().catch(() => null);
                if (!r.ok) {
                    throw new Error(payload?.error || r.statusText);
                }
                return payload;
            }

            function mapApiTask(t) {
                return {
                    id: t.id,
                    title: t.title,
                    priority: t.priority,
                    status: t.status,
                    assigned: t.assigned_to || [],
                    tags: t.tags || [],
                    due_date: t.due_date || null,
                };
            }

            function fillUserSelect(select, selectedIds = []) {
                if (!select) return;
                select.innerHTML = "";
                USERS.forEach((u) => {
                    const opt = document.createElement("option");
                    opt.value = u.id;
                    opt.textContent = u.name;
                    opt.selected = selectedIds.includes(u.id);
                    select.appendChild(opt);
                });
            }

            function userInitial(name) {
                return (name || "?").trim().charAt(0).toUpperCase() || "?";
            }

            async function loadData() {
                const [data, config] = await Promise.all([
                    apiJson("/api/data"),
                    apiJson("/api/config").catch(() => null),
                ]);
                USERS = (data.users || []).map((u, i) => ({
                    id: u.id,
                    name: u.username,
                    pic: u.pic || "",
                    color: COLORS[i % COLORS.length],
                }));
                TASKS = (data.tasks || [])
                    .filter((t) => !t.is_trash)
                    .map(mapApiTask);
                TRASH = (data.tasks || [])
                    .filter((t) => t.is_trash)
                    .map(mapApiTask);
                COMMENTS = data.comments || [];
                if (config && !localStorage.getItem("kb-theme")) {
                    applyTheme(
                        config.theme_dashboard === "light" ? "light" : "dark",
                    );
                }
                if (config) {
                    useTrash = config.use_trash !== false;
                    document.getElementById("trashToggle").checked = useTrash;
                    updateTrashToggleLabel();
                }
                render();
                if (currentHeroTaskId) {
                    openHero(currentHeroTaskId);
                }
            }

            function render() {
                renderTagFilters();
                renderBoard();
                renderFooter();
                renderTrashList();
                renderUserManager();
            }

            function setExportStatus(message, kind = "ok") {
                const el = document.getElementById("exportStatus");
                if (!el) return;
                el.textContent = message;
                el.dataset.state = kind;
                clearTimeout(exportStatusTimer);
                exportStatusTimer = setTimeout(() => {
                    el.textContent = "";
                    delete el.dataset.state;
                }, 3500);
            }

            function markdownInlineToHtml(text) {
                if (!text) return "";
                let html = esc(text);
                const codeSpans = [];
                html = html.replace(/`([^`]+)`/g, (_, code) => {
                    const token = `@@CODE${codeSpans.length}@@`;
                    codeSpans.push(code);
                    return token;
                });
                html = html.replace(/\*\*([\s\S]+?)\*\*/g, "<strong>$1</strong>");
                html = html.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, "$1<em>$2</em>");
                html = html.replace(/(^|[^_])_([^_\n]+?)_(?!_)/g, "$1<em>$2</em>");
                html = html.replace(/@@CODE(\d+)@@/g, (_, index) => {
                    const code = codeSpans[Number(index)] || "";
                    return `<code>${code}</code>`;
                });
                return html;
            }

            function markdownBlocksToHtml(text) {
                const lines = (text || "").replace(/\r\n/g, "\n").split("\n");
                const blocks = [];
                let i = 0;

                while (i < lines.length) {
                    const line = lines[i];
                    if (!line.trim()) {
                        i += 1;
                        continue;
                    }

                    if (/^#\s+/.test(line)) {
                        blocks.push(`<h1>${markdownInlineToHtml(line.replace(/^#\s+/, ""))}</h1>`);
                        i += 1;
                        continue;
                    }

                    const unordered = line.match(/^(\s*)[-*+]\s+(.+)$/);
                    const ordered = line.match(/^(\s*)\d+\.\s+(.+)$/);
                    if (unordered || ordered) {
                        const isOrdered = Boolean(ordered);
                        const items = [];
                        while (i < lines.length) {
                            const current = lines[i];
                            const match = current.match(
                                isOrdered
                                    ? /^(\s*)\d+\.\s+(.+)$/
                                    : /^(\s*)[-*+]\s+(.+)$/,
                            );
                            if (!match) break;
                            items.push(`<li>${markdownInlineToHtml(match[2])}</li>`);
                            i += 1;
                        }
                        blocks.push(`<${isOrdered ? "ol" : "ul"}>${items.join("")}</${isOrdered ? "ol" : "ul"}>`);
                        continue;
                    }

                    const paragraph = [];
                    while (i < lines.length) {
                        const current = lines[i];
                        if (!current.trim()) break;
                        if (
                            /^#\s+/.test(current) ||
                            /^(\s*)[-*+]\s+.+$/.test(current) ||
                            /^(\s*)\d+\.\s+.+$/.test(current)
                        ) {
                            break;
                        }
                        paragraph.push(current);
                        i += 1;
                    }

                    if (!paragraph.length) {
                        i += 1;
                        continue;
                    }

                    blocks.push(
                        `<p>${paragraph.map((part) => markdownInlineToHtml(part)).join("<br>")}</p>`,
                    );
                }

                return blocks.join("");
            }

            function serializeInlineNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return (node.nodeValue || "").replace(/\u00a0/g, " ");
                }
                if (node.nodeType !== Node.ELEMENT_NODE) return "";

                const tag = node.tagName.toLowerCase();
                const children = Array.from(node.childNodes)
                    .map(serializeInlineNode)
                    .join("");

                switch (tag) {
                    case "br":
                        return "\n";
                    case "strong":
                    case "b":
                        return `**${children}**`;
                    case "em":
                    case "i":
                        return `*${children}*`;
                    case "code":
                        return `\`${children}\``;
                    default:
                        return children;
                }
            }

            function isBlockMarkdownTag(tag) {
                return tag === "h1" || tag === "p" || tag === "div" || tag === "ul" || tag === "ol" || tag === "li";
            }

            function serializeListItemNode(node, ordered, index) {
                const parts = Array.from(node.childNodes).map(serializeBlockNode);
                const text = parts.join("").replace(/\r\n/g, "\n").trim();
                if (!text) return "";

                const lines = text.split("\n");
                const prefix = ordered ? `${index + 1}. ` : "- ";
                const body = [prefix + lines[0]];
                for (let i = 1; i < lines.length; i += 1) {
                    body.push(`  ${lines[i]}`);
                }
                return body.join("\n") + "\n";
            }

            function serializeBlockNode(node) {
                if (node.nodeType === Node.TEXT_NODE) {
                    return (node.nodeValue || "").replace(/\u00a0/g, " ");
                }
                if (node.nodeType !== Node.ELEMENT_NODE) return "";

                const tag = node.tagName.toLowerCase();
                if (tag === "br") return "\n";

                if (tag === "h1") {
                    const inner = Array.from(node.childNodes).map(serializeInlineNode).join("").trim();
                    return `# ${inner}\n`;
                }

                if (tag === "li") {
                    const inner = Array.from(node.childNodes).map(serializeInlineNode).join("").trim();
                    return inner ? `- ${inner}\n` : "";
                }

                if (tag === "p") {
                    const inner = Array.from(node.childNodes).map(serializeInlineNode).join("").trim();
                    return `${inner}\n`;
                }

                if (tag === "div") {
                    const childTags = Array.from(node.childNodes)
                        .filter((child) => child.nodeType === Node.ELEMENT_NODE)
                        .map((child) => child.tagName.toLowerCase());
                    if (childTags.some(isBlockMarkdownTag)) {
                        return Array.from(node.childNodes).map(serializeBlockNode).join("");
                    }
                    const inner = Array.from(node.childNodes).map(serializeInlineNode).join("").trim();
                    return `${inner}\n`;
                }

                if (tag === "ul" || tag === "ol") {
                    const items = Array.from(node.children)
                        .filter((child) => child.tagName && child.tagName.toLowerCase() === "li")
                        .map((li, index) => serializeListItemNode(li, tag === "ol", index))
                        .filter(Boolean);
                    return items.join("");
                }

                return Array.from(node.childNodes).map(serializeBlockNode).join("");
            }

            function editorHtmlToMarkdown(root) {
                const text = Array.from(root.childNodes)
                    .map(serializeBlockNode)
                    .join("")
                    .replace(/\r\n/g, "\n")
                    .replace(/\u00a0/g, " ");

                return text.replace(/[ \t]+\n/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
            }

            function bindRichEditor(root) {
                const surface = root.querySelector(".rich-editor-surface");
                if (!surface) return;

                root.querySelectorAll("[data-md-command]").forEach((btn) => {
                    btn.addEventListener("pointerdown", (e) => {
                        e.preventDefault();
                        surface.focus();
                        const command = btn.dataset.mdCommand;
                        if (command === "bold") {
                            document.execCommand("bold");
                        } else if (command === "italic") {
                            document.execCommand("italic");
                        } else if (command === "clear") {
                            document.execCommand("removeFormat");
                        } else if (command === "h1") {
                            document.execCommand("formatBlock", false, "h1");
                        } else if (command === "ul") {
                            document.execCommand("insertUnorderedList");
                        } else if (command === "ol") {
                            document.execCommand("insertOrderedList");
                        }
                        surface.dispatchEvent(new Event("input", { bubbles: true }));
                    });
                });

                surface.addEventListener("paste", (e) => {
                    e.preventDefault();
                    const text = e.clipboardData?.getData("text/plain") || "";
                    document.execCommand("insertText", false, text);
                });

                surface.addEventListener("keydown", (e) => {
                    if (!(e.ctrlKey || e.metaKey)) return;
                    if (e.key.toLowerCase() === "b") {
                        e.preventDefault();
                        document.execCommand("bold");
                    }
                    if (e.key.toLowerCase() === "i") {
                        e.preventDefault();
                        document.execCommand("italic");
                    }
                });
            }

                    .replace(/`([^`]+)`/g, "$1")
                    .replace(/\*\*([\s\S]+?)\*\*/g, "$1")
                    .replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, "$1$2")

            function showCommentTooltip(anchor) {
                clearTimeout(commentTooltipHideTimer);
                const tooltip = document.getElementById("commentTooltip");
                if (!tooltip || !anchor) return;

                const author = anchor.dataset.commentAuthor || "Anonyme";
                const stamp = anchor.dataset.commentStamp || "";
                const markdown = anchor.dataset.commentMarkdown || "";
                tooltip.innerHTML = `
          <div class="comment-tooltip-head">
            <strong>${esc(author)}</strong>
            <span>${esc(stamp)}</span>
          </div>
          <div class="comment-tooltip-content">${renderCommentContent(markdown)}</div>
        `;

                tooltip.classList.add("open");
                tooltip.setAttribute("aria-hidden", "false");
                tooltip.dataset.placement = "bottom";
                tooltip.style.left = "0px";
                tooltip.style.top = "0px";
                tooltip.style.visibility = "hidden";

                requestAnimationFrame(() => {
                    const anchorRect = anchor.getBoundingClientRect();
                    const tipRect = tooltip.getBoundingClientRect();
                    const gap = 12;
                    const margin = 12;
                    const viewportWidth = window.innerWidth;
                    const viewportHeight = window.innerHeight;

                    const spaceBelow = viewportHeight - anchorRect.bottom - gap - margin;
                    const spaceAbove = anchorRect.top - gap - margin;
                    const placement =
                        spaceBelow >= tipRect.height || spaceBelow >= spaceAbove
                            ? "bottom"
                            : "top";
                    let top =
                        placement === "bottom"
                            ? anchorRect.bottom + gap
                            : anchorRect.top - tipRect.height - gap;
                    top = Math.max(margin, Math.min(top, viewportHeight - tipRect.height - margin));

                    let left =
                        anchorRect.left + anchorRect.width / 2 - tipRect.width / 2;
                    left = Math.max(margin, Math.min(left, viewportWidth - tipRect.width - margin));

                    const arrowX = Math.max(
                        18,
                        Math.min(
                            anchorRect.left + anchorRect.width / 2 - left,
                            tipRect.width - 18,
                        ),
                    );

                    tooltip.dataset.placement = placement;
                    tooltip.style.setProperty("--comment-tooltip-arrow-x", `${arrowX}px`);
                    tooltip.style.left = `${left}px`;
                    tooltip.style.top = `${top}px`;
                    tooltip.style.visibility = "visible";
                });
            }

            function normalizeTagKey(tag) {

            function tagsMatchFilter(tags, filter) {
                if (!filter) return true;
                return tags.some((tag) => normalizeTagKey(tag) === filter);

            function renderTagChips(tags, className = "card-tag", clickable = false) {
                if (!tags || !tags.length) return "";
                return tags
                    .map(
                        (tag) => `
          <${clickable ? "button" : "span"}
            ${clickable ? 'type="button"' : ""}
            class="${className}"
            data-tag="${esc(tag)}"

            function renderTagFilters() {
                const wrap = document.getElementById("tagFilters");
                if (!wrap) return;

                const counts = new Map();
                TASKS.filter((task) => !task.is_trash).forEach((task) => {
                    (task.tags || []).forEach((tag) => {
                        const key = normalizeTagKey(tag);
                        if (!key) return;
                        if (!counts.has(key)) {
                            counts.set(key, { label: tag.trim(), count: 0 });
                        }
                        counts.get(key).count += 1;
                    });
                });

                const tags = Array.from(counts.entries()).sort((a, b) => {
                    if (b[1].count !== a[1].count) return b[1].count - a[1].count;
                    return a[1].label.localeCompare(b[1].label);
                });

                wrap.innerHTML = `
      <button class="tag-filter ${!activeTagFilter ? "active" : ""}" data-filter="">All</button>
      ${
          tags.length
              ? tags
                    .map(
                        ([key, meta]) => `
        <button class="tag-filter ${activeTagFilter === key ? "active" : ""}" data-filter="${esc(key)}">
          ${esc(meta.label)} <span class="tag-filter-count">${meta.count}</span>
        </button>`,
                    )
                    .join("")
              : '<span class="tag-filter-empty">No tags yet.</span>'
      }
    `;

                wrap.querySelectorAll("[data-filter]").forEach((btn) => {
                    btn.addEventListener("click", () => {
                        setTagFilter(btn.dataset.filter || "");
                    });
                });
            }

                    .querySelector('[data-field="username"]')
                    .value.trim();
                const pic = row
                    .querySelector('[data-field="pic"]')
                    .value.trim();
                if (!username) return;
                await apiJson("/api/users", {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        id,
                        username,
                        pic: pic || null,
                    }),
                });
                await loadData();
            }

                await apiJson("/api/users", {
                    method: "DELETE",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id }),
                });
                await loadData();
            }

            async function saveTaskAssignment(taskId, select) {
                const assigned = Array.from(select.selectedOptions).map(
                    (o) => o.value,
                );
                await apiJson("/api/task-assign", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        task_id: taskId,
                        assigned_to: assigned,
                    }),
                });
                await loadData();
            }

            async function saveTaskUpdate(taskId) {
                const title = getEditorMarkdown(
                    document.getElementById("editTaskTitleEditor"),
                );
                const priority =
                    document.getElementById("editTaskPriority").value;
                const tags = splitTagsInput(
                    document.getElementById("editTaskTags").value,
                );
                const due = document.getElementById("editTaskDue").value.trim();

                if (!title) return;

                await apiJson("/api/task-update", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        id: taskId,
                        title,
                        priority,
                        tags,
                        due_date: due,
                    }),
                });
                const heroOpen = document
                    .getElementById("heroOverlay")
                    .classList.contains("open");
                closeEditModal();
                await loadData();
                if (heroOpen && taskId) openHero(taskId);
            }

                const task = TASKS.find((item) => item.id === taskId);
                if (!task) return;

                editingTaskId = taskId;
                setEditorMarkdown(
                    document.getElementById("editTaskTitleEditor"),
                    task.title,
                );
                document.getElementById("editTaskPriority").value =
                    task.priority;
                document.getElementById("editTaskTags").value = (task.tags || []).join(", ");

                    ? task.due_date.slice(0, 10)
                    : "";
                openModal("editModal");
                document.getElementById("editTaskTitleEditor").focus();

                const re = new RegExp(
                    "(" + query.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")",
                    "gi",
                );
                return esc(text).replace(
                    re,
                    '<span class="search-highlight">$1</span>',
                );

                const q = query.toLowerCase();

                    )
                        return true;
                    if (
                        t.priority.includes(q) ||
                        (t.priority === "high" &&
                            (q === "High" || q === "haut")) ||
                        (t.priority === "medium" &&
                            (q === "Medium" || q === "moyen")) ||

          </span>`

            document
                .getElementById("heroClose")
                .addEventListener("click", () => {
                    document
                        .getElementById("heroOverlay")
                        .classList.remove("open");
                    currentHeroTaskId = null;
                });

            function esc(str) {
                const d = document.createElement("div");
                d.textContent = str;
                return d.innerHTML;
            }

            let liveReloadSource = null;
            function setupLiveReload() {
                if (liveReloadSource || !window.EventSource) return;
                liveReloadSource = new EventSource("/api/events");
                liveReloadSource.addEventListener("reload", () => {
                    loadData().catch((err) =>
                        console.error("Dashboard reload failed:", err),
                    );
                });
            }

            setupLiveReload();

            loadData().catch((err) =>
                console.error("Dashboard load failed:", err),
            );
        </script>
    </body>
</html>
